<div class="page">
  <header class="page-header">
    <h1>Mes Séances</h1>
    <button class="btn-add" (click)="createNew()" title="Nouvelle séance">+</button>
  </header>

  <div class="empty-state" *ngIf="sessions.length === 0">
    <button class="btn-empty-add" (click)="createNew()">+</button>
    <p>Créez votre première séance</p>
  </div>

  <ul class="session-list" *ngIf="sessions.length > 0">
    <li class="session-item" *ngFor="let session of sessions">
      <div class="session-info" (click)="editSession(session)">
        <span class="session-name">{{ session.name }}</span>
        <span class="session-meta">{{ session.exercises.length }} exercice{{ session.exercises.length > 1 ? 's' : '' }}</span>
      </div>
      <div class="session-actions">
        <button class="btn-icon btn-history" (click)="viewHistory(session)" title="Historique">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </button>
        <button class="btn-icon btn-edit" (click)="editSession(session)" title="Modifier">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="btn-icon btn-play" (click)="startWorkout(session)" title="Démarrer">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
      </div>
    </li>
  </ul>
</div>
